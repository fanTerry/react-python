services:
  backend:
    build: ./backend
    container_name: fullstack-backend
    restart: unless-stopped
    environment:
      APP_DB_PATH: /data/app.db
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-at-least-32-bytes-long!!}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
    volumes:
      - app-data:/data
    expose:
      - "8999"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8999/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: fullstack-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app-data:
